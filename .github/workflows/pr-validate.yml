name: Pull Request Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: pr-validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

      - name: Run lint
        run: bun run lint

      - name: Run format check
        run: bun run format

  release-dry-run:
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run per-package semantic-release dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bun --cwd=packages/core run release -- --dry-run
          bun --cwd=packages/database run release -- --dry-run
          bun --cwd=packages/server run release -- --dry-run
          bun --cwd=packages/jobs run release -- --dry-run
          bun --cwd=packages/import-zsl run release -- --dry-run

  build-packages:
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build all package binaries
        run: |
          bun run build:server
          bun run build:jobs
          bun run build:migrate
          bun run build:import-zsl

      - name: Upload compiled binaries
        uses: actions/upload-artifact@v4
        with:
          name: compiled-binaries
          if-no-files-found: error
          path: |
            dist/zeepcentraal-server
            dist/zeepcentraal-jobs
            dist/zeepcentraal-migrate
            dist/zeepcentraal-import-zsl

  docker-build:
    runs-on: ubuntu-latest
    needs: [build-packages, release-dry-run]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download compiled binaries
        uses: actions/download-artifact@v4
        with:
          name: compiled-binaries
          path: .

      - name: Clone Super League Data
        run: |
          git clone --depth 1 --branch data https://github.com/zeepkist/super-league.git super_league_data

      - name: Build server image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: false
          tags: zeepcentraal/server:pr-${{ github.event.pull_request.number }}

      - name: Build jobs image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.jobs
          push: false
          tags: zeepcentraal/jobs:pr-${{ github.event.pull_request.number }}

      - name: Build migrate image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.migrate
          push: false
          tags: zeepcentraal/migrate:pr-${{ github.event.pull_request.number }}

      - name: Build import-zsl image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.zsl
          push: false
          tags: zeepcentraal/import-zsl:pr-${{ github.event.pull_request.number }}
