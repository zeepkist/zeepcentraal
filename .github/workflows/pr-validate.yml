name: Pull Request Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    branches: [develop]
    types: [checks_requested]

permissions:
  contents: read

concurrency:
  group: pr-validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun node_modules
        id: bun-node-modules-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-node-modules-${{ hashFiles('bun.lock', 'package.json', 'packages/*/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-node-modules-

      - name: Install dependencies
        if: steps.bun-node-modules-cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Run lint
        run: bun run lint

      - name: Run format check
        run: bun run format

  build-packages:
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun node_modules
        id: bun-node-modules-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-node-modules-${{ hashFiles('bun.lock', 'package.json', 'packages/*/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-node-modules-

      - name: Install dependencies
        if: steps.bun-node-modules-cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Build all package binaries
        run: |
          bun run build:server
          bun run build:jobs
          bun run build:migrate
          bun run build:import-zsl

      - name: Upload compiled binaries
        uses: actions/upload-artifact@v7
        with:
          name: compiled-binaries
          if-no-files-found: error
          path: |
            dist/zeepcentraal-server
            dist/zeepcentraal-jobs
            dist/zeepcentraal-migrate
            dist/zeepcentraal-import-zsl

  docker-build:
    runs-on: ubuntu-latest
    needs: [build-packages]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download compiled binaries
        uses: actions/download-artifact@v8
        with:
          name: compiled-binaries
          path: dist

      - name: Normalize and verify compiled binaries
        run: |
          if [ -d dist/dist ]; then
            mv dist/dist/* dist/
            rmdir dist/dist
          fi
          test -f dist/zeepcentraal-server
          test -f dist/zeepcentraal-jobs
          test -f dist/zeepcentraal-migrate
          test -f dist/zeepcentraal-import-zsl

      - name: Clone Super League Data
        run: |
          git clone --depth 1 --branch data https://github.com/zeepkist/super-league.git super_league_data

      - name: Build server image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.server
          push: false
          tags: zeepcentraal/server:pr-${{ github.event.pull_request.number || github.run_id }}

      - name: Build jobs image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.jobs
          push: false
          tags: zeepcentraal/jobs:pr-${{ github.event.pull_request.number || github.run_id }}

      - name: Build migrate image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.migrate
          push: false
          tags: zeepcentraal/migrate:pr-${{ github.event.pull_request.number || github.run_id }}

      - name: Build import-zsl image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.zsl
          push: false
          tags: zeepcentraal/import-zsl:pr-${{ github.event.pull_request.number || github.run_id }}
