name: Deploy

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  packages: write
  pull-requests: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun-deps

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun run test

  release:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && !contains(github.event.head_commit.message, 'chore(release):'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun-deps

      - name: Configure git user
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Run per-package semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run release

  build-server:
    runs-on: ubuntu-latest
    needs: [test, release]
    if: always() && needs.test.result == 'success' && (needs.release.result == 'success' || needs.release.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun-deps

      - name: Build server binary
        run: bun run build:server

      - name: Resolve server image version tags
        id: server_version
        run: |
          git fetch --force --tags origin
          TAG="$(git tag -l 'server@*' --sort=-v:refname | head -n 1)"
          if [ -z "$TAG" ]; then
            echo "No server release tags found (expected pattern: server@x.y.z)." >&2
            exit 1
          fi
          VERSION="${TAG#server@}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "Invalid semantic version parsed from tag '$TAG'." >&2
            exit 1
          fi
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR.$MINOR" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/server:latest
            ghcr.io/${{ github.repository }}/server:${{ github.sha }}
            ghcr.io/${{ github.repository }}/server:${{ steps.server_version.outputs.major }}
            ghcr.io/${{ github.repository }}/server:${{ steps.server_version.outputs.major_minor }}
            ghcr.io/${{ github.repository }}/server:${{ steps.server_version.outputs.version }}

  build-jobs:
    runs-on: ubuntu-latest
    needs: [test, release]
    if: always() && needs.test.result == 'success' && (needs.release.result == 'success' || needs.release.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun-deps

      - name: Build jobs binary
        run: bun run build:jobs

      - name: Resolve jobs image version tags
        id: jobs_version
        run: |
          git fetch --force --tags origin
          TAG="$(git tag -l 'jobs@*' --sort=-v:refname | head -n 1)"
          if [ -z "$TAG" ]; then
            echo "No jobs release tags found (expected pattern: jobs@x.y.z)." >&2
            exit 1
          fi
          VERSION="${TAG#jobs@}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "Invalid semantic version parsed from tag '$TAG'." >&2
            exit 1
          fi
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR.$MINOR" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push jobs image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.jobs
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/jobs:latest
            ghcr.io/${{ github.repository }}/jobs:${{ github.sha }}
            ghcr.io/${{ github.repository }}/jobs:${{ steps.jobs_version.outputs.major }}
            ghcr.io/${{ github.repository }}/jobs:${{ steps.jobs_version.outputs.major_minor }}
            ghcr.io/${{ github.repository }}/jobs:${{ steps.jobs_version.outputs.version }}

  build-migrate:
    runs-on: ubuntu-latest
    needs: [test, release]
    if: always() && needs.test.result == 'success' && (needs.release.result == 'success' || needs.release.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun-deps

      - name: Build migrate binary
        run: bun run build:migrate

      - name: Resolve migrate image version tags
        id: migrate_version
        run: |
          git fetch --force --tags origin
          TAG="$(git tag -l 'database@*' --sort=-v:refname | head -n 1)"
          if [ -z "$TAG" ]; then
            echo "No database release tags found (expected pattern: database@x.y.z)." >&2
            exit 1
          fi
          VERSION="${TAG#database@}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "Invalid semantic version parsed from tag '$TAG'." >&2
            exit 1
          fi
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR.$MINOR" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push migrate image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.migrate
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/migrate:latest
            ghcr.io/${{ github.repository }}/migrate:${{ github.sha }}
            ghcr.io/${{ github.repository }}/migrate:${{ steps.migrate_version.outputs.major }}
            ghcr.io/${{ github.repository }}/migrate:${{ steps.migrate_version.outputs.major_minor }}
            ghcr.io/${{ github.repository }}/migrate:${{ steps.migrate_version.outputs.version }}

  build-import-zsl:
    runs-on: ubuntu-latest
    needs: [test, release]
    if: always() && needs.test.result == 'success' && (needs.release.result == 'success' || needs.release.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Clone Super League Data
        run: |
          git clone --depth 1 --branch data https://github.com/zeepkist/super-league.git super_league_data

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun-deps

      - name: Build import-zsl binary
        run: bun run build:import-zsl

      - name: Resolve import-zsl image version tags
        id: import_zsl_version
        run: |
          git fetch --force --tags origin
          TAG="$(git tag -l 'import-zsl@*' --sort=-v:refname | head -n 1)"
          if [ -z "$TAG" ]; then
            echo "No import-zsl release tags found (expected pattern: import-zsl@x.y.z)." >&2
            exit 1
          fi
          VERSION="${TAG#import-zsl@}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "Invalid semantic version parsed from tag '$TAG'." >&2
            exit 1
          fi
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR.$MINOR" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push import-zsl image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.zsl
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/import-zsl:latest
            ghcr.io/${{ github.repository }}/import-zsl:${{ github.sha }}
            ghcr.io/${{ github.repository }}/import-zsl:${{ steps.import_zsl_version.outputs.major }}
            ghcr.io/${{ github.repository }}/import-zsl:${{ steps.import_zsl_version.outputs.major_minor }}
            ghcr.io/${{ github.repository }}/import-zsl:${{ steps.import_zsl_version.outputs.version }}
