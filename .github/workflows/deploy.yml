name: Deploy

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun run test

  release:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && !contains(github.event.head_commit.message, 'chore(release):'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install

      - name: Configure git user
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Run per-package semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run release

  build-server:
    runs-on: ubuntu-latest
    needs: [test, release]
    if: always() && needs.test.result == 'success' && (needs.release.result == 'success' || needs.release.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build server binary
        run: bun run build:server

      - name: Resolve server image version tags
        id: server_version
        run: |
          VERSION="$(bun -e 'const pkg = await Bun.file("packages/server/package.json").json(); console.log(pkg.version);')"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR.$MINOR" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/server:latest
            ghcr.io/${{ github.repository }}/server:${{ github.sha }}
            ghcr.io/${{ github.repository }}/server:${{ steps.server_version.outputs.major }}
            ghcr.io/${{ github.repository }}/server:${{ steps.server_version.outputs.major_minor }}
            ghcr.io/${{ github.repository }}/server:${{ steps.server_version.outputs.version }}

  build-jobs:
    runs-on: ubuntu-latest
    needs: [test, release]
    if: always() && needs.test.result == 'success' && (needs.release.result == 'success' || needs.release.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build jobs binary
        run: bun run build:jobs

      - name: Resolve jobs image version tags
        id: jobs_version
        run: |
          VERSION="$(bun -e 'const pkg = await Bun.file("packages/jobs/package.json").json(); console.log(pkg.version);')"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR.$MINOR" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push jobs image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.jobs
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/jobs:latest
            ghcr.io/${{ github.repository }}/jobs:${{ github.sha }}
            ghcr.io/${{ github.repository }}/jobs:${{ steps.jobs_version.outputs.major }}
            ghcr.io/${{ github.repository }}/jobs:${{ steps.jobs_version.outputs.major_minor }}
            ghcr.io/${{ github.repository }}/jobs:${{ steps.jobs_version.outputs.version }}

  build-migrate:
    runs-on: ubuntu-latest
    needs: [test, release]
    if: always() && needs.test.result == 'success' && (needs.release.result == 'success' || needs.release.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve migrate image version tags
        id: migrate_version
        run: |
          VERSION="$(bun -e 'const pkg = await Bun.file("packages/database/package.json").json(); console.log(pkg.version);')"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR.$MINOR" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.migrate
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/migrate:latest
            ghcr.io/${{ github.repository }}/migrate:${{ github.sha }}
            ghcr.io/${{ github.repository }}/migrate:${{ steps.migrate_version.outputs.major }}
            ghcr.io/${{ github.repository }}/migrate:${{ steps.migrate_version.outputs.major_minor }}
            ghcr.io/${{ github.repository }}/migrate:${{ steps.migrate_version.outputs.version }}

  build-import-zsl:
    runs-on: ubuntu-latest
    needs: [test, release]
    if: always() && needs.test.result == 'success' && (needs.release.result == 'success' || needs.release.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Clone Super League Data
        run: |
          git clone --depth 1 --branch data https://github.com/zeepkist/super-league.git super_league_data

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve import-zsl image version tags
        id: import_zsl_version
        run: |
          VERSION="$(bun -e 'const pkg = await Bun.file("packages/import-zsl/package.json").json(); console.log(pkg.version);')"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR.$MINOR" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push import-zsl image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.zsl
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/import-zsl:latest
            ghcr.io/${{ github.repository }}/import-zsl:${{ github.sha }}
            ghcr.io/${{ github.repository }}/import-zsl:${{ steps.import_zsl_version.outputs.major }}
            ghcr.io/${{ github.repository }}/import-zsl:${{ steps.import_zsl_version.outputs.major_minor }}
            ghcr.io/${{ github.repository }}/import-zsl:${{ steps.import_zsl_version.outputs.version }}
